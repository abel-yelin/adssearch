version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: adssearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adssearch
      POSTGRES_USER: adssearch
      POSTGRES_PASSWORD: adssearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adssearch -d adssearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adssearch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adssearch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://adssearch:adssearch@postgres:5432/adssearch
      APP_ENV: production
      LOG_LEVEL: INFO
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adssearch-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://adssearch:adssearch@postgres:5432/adssearch
      APP_ENV: production
      LOG_LEVEL: INFO
    command: ["python", "-m", "app.worker"]

  sitemap-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adssearch-sitemap-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://adssearch:adssearch@postgres:5432/adssearch
      APP_ENV: production
      LOG_LEVEL: INFO
      SITEMAP_SCHEDULER_POLL_SECONDS: 30
    command: ["python", "-m", "app.sitemap_scheduler"]

volumes:
  postgres_data:
